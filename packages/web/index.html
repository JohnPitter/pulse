<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- SEO -->
    <title>Pulse — Remote Claude Agent Manager</title>
    <meta name="description" content="Deploy, monitor, and control multiple Claude Code agents on your remote server through a real-time web dashboard. Split-view terminals, one-click deploy, and live status tracking." />
    <meta name="keywords" content="Claude, Claude Code, AI agents, remote management, terminal, developer tools, Anthropic" />
    <meta name="author" content="Pulse" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Pulse — Remote Claude Agent Manager" />
    <meta property="og:description" content="Deploy, monitor, and control multiple Claude Code agents on your remote server through a real-time web dashboard." />
    <meta property="og:image" content="/icon-512.png" />
    <meta property="og:site_name" content="Pulse" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Pulse — Remote Claude Agent Manager" />
    <meta name="twitter:description" content="Deploy, monitor, and control multiple Claude Code agents on your remote server through a real-time web dashboard." />
    <meta name="twitter:image" content="/icon-512.png" />

    <!-- PWA & Theme -->
    <meta name="theme-color" content="#f97316" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pulse" />
    <meta name="application-name" content="Pulse" />
    <meta name="msapplication-TileColor" content="#f97316" />
    <meta name="msapplication-TileImage" content="/icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Pulse",
      "description": "Remote management dashboard for Claude Code AI agents. Deploy, monitor, and control multiple agents on your server through a real-time web interface.",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Linux",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "softwareHelp": {
        "@type": "CreativeWork",
        "name": "Pulse Documentation",
        "url": "https://github.com/JohnPitter/pulse"
      },
      "featureList": [
        "Multi-agent management",
        "Real-time split-view terminals",
        "One-click agent deployment",
        "Live status monitoring",
        "Context usage tracking",
        "OAuth and API key authentication"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Splash screen — replaced when React mounts -->
      <style>
        #splash{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#08080A;gap:24px;font-family:Inter,system-ui,sans-serif}
        #splash .logo-wrap{position:relative;display:flex;align-items:center;justify-content:center}
        #splash .logo{width:64px;height:64px;border-radius:16px;background:#0c0a09;border:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;position:relative;z-index:1}
        #splash .logo span{font-size:28px;font-weight:700;color:#F97316}
        #splash .ring{position:absolute;inset:-8px;border-radius:24px;border:2px solid rgba(249,115,22,0.15);animation:splash-ring 2s ease-in-out infinite}
        #splash .ring-2{position:absolute;inset:-16px;border-radius:32px;border:1.5px solid rgba(249,115,22,0.08);animation:splash-ring 2s ease-in-out infinite 0.4s}
        #splash .brand{font-size:18px;font-weight:600;color:#EDEDEF;letter-spacing:-0.02em}
        #splash .sub{font-size:13px;color:#5C5C66;margin-top:-12px}
        #splash .dots{display:flex;gap:6px;margin-top:8px}
        #splash .dots span{width:5px;height:5px;border-radius:50%;background:#F97316;animation:splash-dot 1.4s ease-in-out infinite}
        #splash .dots span:nth-child(2){animation-delay:0.2s}
        #splash .dots span:nth-child(3){animation-delay:0.4s}
        @keyframes splash-ring{0%,100%{opacity:0.4;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
        @keyframes splash-dot{0%,80%,100%{opacity:0.3;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}
      </style>
      <div id="splash">
        <div class="logo-wrap">
          <div class="ring"></div>
          <div class="ring-2"></div>
          <div class="logo"><span>P</span></div>
        </div>
        <div class="brand">Pulse</div>
        <div class="sub">Remote Agent Manager</div>
        <div class="dots"><span></span><span></span><span></span></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
